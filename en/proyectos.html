    .portfolio-card {
      position: relative;
      display: block;
      overflow: hidden;
      min-height: 320px;
      margin-bottom: 24px;
      background: #000;
    }

    .portfolio-card video,
    .portfolio-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .portfolio-card:hover video,
    .portfolio-card:hover img {
      transform: scale(1.03);
    }

    .portfolio-card__overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 18px;
      text-align: left;
      z-index: 2;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.06) 22%, rgba(0, 0, 0, 0.78) 100%);
    }

    .portfolio-card__content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      max-width: 100%;
    }

    .portfolio-card__button {
      pointer-events: none;
      margin: 0;
    }

    .portfolio-card__excerpt {
      margin: 0;
      color: #ffffff;
      font-size: 0.95rem;
      line-height: 1.4;
      max-width: 34ch;
      text-wrap: balance;
    }

    @media (max-width: 767.98px) {

        padding: 14px;
      }

      .portfolio-card__button {
        padding: 0.35rem 0.85rem !important;
      }

      .portfolio-card__excerpt {
        font-size: 0.88rem;
      }
    }

    #portfolio-grid .col-lg-4 {
      display: flex;
    }

    .portfolio-card,
    .portfolio-card video {
      border-radius: 2px;
    }
  </style>

  <script>
    const projects = [
      '/evidenciaoculta-2025/media.json',
      '/todogood-2025/media.json',
      '/lamula-2025/media.json',
      '/esb-pgl-wallachia-season-1/media.json',
      '/canalya-2025/media.json',
      '/esb-esl-one-birmingham-2024/media.json',
      '/esb-dreamleague/media.json',
      '/esb-eliteleague-s1/media.json',
      '/esb-betboom-dacha-2024/media.json',
      '/ti-pubstomp/media.json',
      '/pgl-major-copenhagen-2024/media.json',
      '/billy-elliot/media.json',
      '/lovesimon/media.json',
      '/viejamoralidad/media.json'
    ];

    function createCard(projectData) {
      const firstVideo = (projectData.media || []).find((item) => item.type === 'video');
      const firstImage = (projectData.media || []).find((item) => item.type === 'image');
      const preview = firstVideo || firstImage;

      if (!preview || !projectData.href || !projectData.title) {
        return null;
      }

      const excerpt = projectData.excerpt || '';

      const col = document.createElement('div');
      col.className = 'col-lg-4';

      const previewMarkup = preview.type === 'video'
        ? `<video src="${preview.src}" class="img-fluid" autoplay muted loop playsinline preload="metadata"></video>`
        : `<img src="${preview.src}" class="img-fluid" alt="${projectData.title}" loading="lazy">`;

      col.innerHTML = `
        <a class="portfolio-card" href="${projectData.href}" aria-label="${projectData.title}">
          ${previewMarkup}
          <span class="portfolio-card__overlay">
            <span class="portfolio-card__content">
              <span class="btn btn-outline-white py-2 px-4 portfolio-card__button">${projectData.title}</span>
              ${excerpt ? `<p class="portfolio-card__excerpt">${excerpt}</p>` : ''}
            </span>
          </span>
        </a>
      `;

      return col;
    }

    async function renderPortfolio() {
      const grid = document.getElementById('portfolio-grid');

      const loaded = await Promise.all(
        projects.map(async (path) => {
          try {
            const response = await fetch(path);
            if (!response.ok) {
              return null;
            }
            return await response.json();
          } catch (error) {
            return null;
          }
        })
      );

      loaded.forEach((projectData) => {
        if (!projectData) {
          return;
        }

        const card = createCard(projectData);
        if (card) {
          grid.appendChild(card);
        }
      });
    }

    renderPortfolio();
  </script>
